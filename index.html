<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Hosted Content Website</title>
    <style>
        :root {
            /* Light Mode Variables */
            --bg-color: #f0f4f8;
            --container-bg: #ffffff;
            --text-color: #333333;
            --card-bg: #ffffff;
            --primary: #4F46E5;
            --accent: #E0E7FF;
            --header-bg: #ffffff;
            --border-color: #d1d5db;
        }

        body.dark-mode {
            /* Dark Mode Variables */
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #f1f1f1;
            --card-bg: #2d2d2d;
            --primary: #818cf8;
            --accent: #3730a3;
            --header-bg: #1e1e1e;
            --border-color: #4b5563;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        
        /* Permanent Header Banner Wrapper Fix  */
        #global-sticky-zone {
            position: sticky;
            top: 0;
            z-index: 150;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Top Persistent Branding Banner Header Elements */
        #my-brand-banner {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 16px 20px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Top Header Navigation Details Under Banner Header Menu Info Context Set System Tracker Area*/
        #navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--header-bg);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        #nav-left { display: flex; align-items: center; gap: 15px; }
        
        #nav-right { flex-shrink: 0; display:flex; gap: 5px; }
        
        #page-title {
            word-wrap: break-word; /* Allows full locations long titles to safely wrap in tight screens */
            overflow-wrap: break-word; 
            line-height: 1.4;
        }
        
        button.btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button.btn:active { transform: scale(0.96); }

        .hidden { display: none !important; }

        /* Search Bar Wrapper */
        #search-container {
            padding: 12px 20px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
        }
        
        #search-box {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--container-bg);
            color: var(--text-color);
            font-size: 16px;
        }

        /* Main Content List */
        #content-list {
            padding: 20px 20px 90px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }

        .card:hover { border-color: var(--primary); }

        /* Types of content styles */
        .type-textline { padding: 18px; font-weight: 500; font-size: 18px; }

        .type-blockimage img {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            background: #000;
        }
        .type-blockimage .img-text { padding: 12px 15px; font-size: 18px; text-align: center; font-weight: bold; }

        .type-contact { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .contact-header { display: flex; align-items: center; gap: 15px; }
        .contact-img { 
            width: 60px; height: 60px; border-radius: 50%; object-fit: cover; 
            border: 2px solid var(--primary);
            cursor: pointer; 
        }
        .contact-name { font-size: 20px; font-weight: bold; }
        .contact-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
        
        .action-link {
            text-decoration: none; padding: 6px 12px; border-radius: 5px; color: white;
            font-size: 14px; font-weight: bold; background: #34d399;
        }
        .action-link.map-link { background: #3b82f6; }
        .action-link.web-link { background: #f59e0b; }

        /* Host Tooling styles */
        .host-tools {
            position: absolute; right: 10px; top: 10px;
            display: flex; gap: 5px; background: rgba(0,0,0,0.6);
            padding: 5px; border-radius: 8px; z-index: 10;
        }
        .host-tools button {
            background: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--text-color); cursor: pointer; padding: 5px; border-radius: 5px; font-size: 12px;
        }
        
        .temporarily-removed { opacity: 0.5; outline: 2px dashed red; }

        /* Floating Admin Bar / Bottom */
        #admin-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--header-bg);
            border-top: 1px solid var(--border-color); padding: 15px; display: flex; justify-content: center; z-index: 99;
        }

        /* Modal Base */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); display: none; 
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal {
            background: var(--card-bg); padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; color:var(--text-color); border:1px solid var(--border-color);
        }
        .modal input, .modal select, .modal button, .modal textarea {
            width: 100%; margin-top: 10px; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--container-bg); color:var(--text-color); font-family: inherit;
        }
        .modal textarea { resize: vertical; }
        
        .modal h3 { margin-bottom: 15px;}
        .close-btn-inline { background: red !important; color: white; margin-top: 15px;}

        /* Full Screen ImageViewer */
        #fullscreen-img-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: none; z-index: 1000; align-items: center; justify-content: center;
        }
        #fullscreen-img-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
    </style>
</head>

    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC04yKj1wlv-GjKEtphMNGnF4Jh9UeYWy0",
            authDomain: "my-basic-facilities.firebaseapp.com",
            databaseURL: "https://my-basic-facilities-default-rtdb.firebaseio.com",
            projectId: "my-basic-facilities",
            storageBucket: "my-basic-facilities.firebasestorage.app",
            messagingSenderId: "507106066548",
            appId: "1:507106066548:web:5ea6afc3507de8534c9121"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        /* Database & States Handler variables */
        let navigationHistory = ["root"]; // holds ids. The very end element[array.length-1] points towards where you are exactly
        let dbData = null; // Whole tree structured db stored locally per domain instance.
        let hostAuthorized = false; 

        window.tempVarIdToTransferFolderLocDataConfigCurrentVarLoc = null;

        // Initial standard dummy setup incase completely clean DB setup triggers upon user enter 
        function defineDefaultData() {
            return {
                id: "root", title: "Home Page",
                children:[
                    { 
                        id: "item1_def", type: "text", title: "Welcome Text Folder!", 
                        hidden: false, children: [] 
                    },
                    { 
                        id: "item2_def", type: "image", title: "Demo Server Rack (Images)", imgSrc: "https://www.w3schools.com/w3images/lights.jpg", 
                        hidden: false, children:[] 
                    },
                    {
                        id: "item3_def", type: "contact", title: "Site Contact Info", hidden: false, 
                        imgSrc: "https://www.w3schools.com/howto/img_avatar.png", phone: "+911234567890", websiteLink: "https://google.com", locationDesc: "Mumbai Central", bio: "Available 24/7 for support and queries.",
                        children:[]
                    }
                ]
            };
        }

        // Firebase routinely removes empty arrays. This rebuilds the tree array integrity.
        function normalizeDBData(node) {
            if (!node) return node;
            if (!node.children) {
                node.children =[];
            } else if (!Array.isArray(node.children)) {
                node.children = Object.values(node.children);
            }
            node.children = node.children.filter(c => c !== null && c !== undefined);
            node.children.forEach(normalizeDBData);
            return node;
        }

        // On document start operations function definitions : Fetch, Theme checks
        window.onload = function() {
            if (sessionStorage.getItem("loggedInCMSHost")) { activateHostMode(); }
            
            // Connect listener to Firebase Realtime Database
            const dbRef = ref(db, 'cmsData');
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                if (data) { 
                    dbData = normalizeDBData(data); 
                } else { 
                    dbData = defineDefaultData(); 
                    saveStore(); 
                }
                loadUiNodeCurrentPageLevelView();
            });
        }
        
        // Commits and synchronizes system array configs to Firebase Database
        function saveStore() {
            set(ref(db, 'cmsData'), dbData).catch(err => {
                console.error("Firebase save failed", err);
                alert("Database Synchronization Failed");
            });
            loadUiNodeCurrentPageLevelView(); 
        }

        // Recursive tree scanner parser 
        function scanIDNodeSystem(startPointObj, lookIDStrVar){
            if (startPointObj.id === lookIDStrVar) return startPointObj;
            for(let childObj of startPointObj.children) {
                let deepresult = scanIDNodeSystem(childObj, lookIDStrVar);
                if (deepresult) return deepresult;
            } return null;
        }

        /* Front rendering routines logic UI display */
        function loadUiNodeCurrentPageLevelView() {
            if(!dbData) return; 

            const currentLayerId = navigationHistory[navigationHistory.length - 1]; 
            const nodeObjectScopeExtraction = scanIDNodeSystem(dbData, currentLayerId); 
            let viewListContainer = document.getElementById("content-list");

            // Build internally complete location directory strings (Breadcrumb Path Gen)
            let fullExpandedBreadCrumbTextPathLocation = "";
            for (let idxTrack=0; idxTrack < navigationHistory.length; idxTrack++){
                 let refExtractionScopeNode = scanIDNodeSystem(dbData, navigationHistory[idxTrack]);
                 if(refExtractionScopeNode && refExtractionScopeNode.title){
                     fullExpandedBreadCrumbTextPathLocation += refExtractionScopeNode.title;
                     if (idxTrack < navigationHistory.length - 1) {
                         fullExpandedBreadCrumbTextPathLocation += " ➔ ";
                     }
                 }
            }

            document.getElementById("page-title").innerText = fullExpandedBreadCrumbTextPathLocation || "Navigation Failure Link Area";
            
            if(navigationHistory.length > 1) { document.getElementById("btn-back").classList.remove("hidden"); } else { document.getElementById("btn-back").classList.add("hidden"); }
            
            viewListContainer.innerHTML = "";
            let searchTextStrSearchConfigContextParamVarKeyword = document.getElementById("search-box").value.toLowerCase(); 

            // Generating UI Object View Card Arrays list logic system blocks setup iter setup Array Setup 
            nodeObjectScopeExtraction.children.forEach((cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj, positionalArrayIntCurrentIterationLayerNodeIdxIntNumSysArrListLoopIntReferenceValNumIdxIntValLoopArrayRefTargetPosExtIntNumVal) => {
                
                if(!hostAuthorized && cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.hidden) return; 
                if(searchTextStrSearchConfigContextParamVarKeyword.length > 0 && !cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.title.toLowerCase().includes(searchTextStrSearchConfigContextParamVarKeyword)){ return;} 

                let layoutNodeObjectComponentFinalCreationBlockDIVWrapperBuildRefElementContainerStrConstructDivLayerDomDivRootSysTagWrapperBoxElHtml = document.createElement("div"); 
                layoutNodeObjectComponentFinalCreationBlockDIVWrapperBuildRefElementContainerStrConstructDivLayerDomDivRootSysTagWrapperBoxElHtml.className = "card " + (cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.hidden ? "temporarily-removed": "");

                if(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.type !== 'contact'){
                     layoutNodeObjectComponentFinalCreationBlockDIVWrapperBuildRefElementContainerStrConstructDivLayerDomDivRootSysTagWrapperBoxElHtml.onclick = () => forwardLayer(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.id);
                } else {
                     layoutNodeObjectComponentFinalCreationBlockDIVWrapperBuildRefElementContainerStrConstructDivLayerDomDivRootSysTagWrapperBoxElHtml.style.cursor = 'default';
                }

                let buildObjectDynamicLayoutMapConfigSetupLayerLogicStringVariablesSetupModGenSysMapText = "";
                if(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.type === 'text') {
                    buildObjectDynamicLayoutMapConfigSetupLayerLogicStringVariablesSetupModGenSysMapText += `<div class="type-textline">${escapeHTML(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.title)}</div>`;
                } 
                else if(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.type === 'image') {
                    buildObjectDynamicLayoutMapConfigSetupLayerLogicStringVariablesSetupModGenSysMapText += `
                        <div class="type-blockimage">
                           <img src="${cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.imgSrc || 'https://via.placeholder.com/800x400.png?text=Broken+Image+Load'}" alt="img_item" loading="lazy">
                           <div class="img-text">${escapeHTML(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.title)}</div>
                        </div>`;
                }
                else if(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.type === 'contact') {
                    let internalComponentsHTMLRefLinksButtonGenTextMapLinkVariablesOptionsRef = "";
                    if(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.phone) internalComponentsHTMLRefLinksButtonGenTextMapLinkVariablesOptionsRef += `<a href="tel:${cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.phone}" class="action-link" onclick="event.stopPropagation()">📞 Call</a>`;
                    if(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.websiteLink) internalComponentsHTMLRefLinksButtonGenTextMapLinkVariablesOptionsRef += `<a href="${cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.websiteLink.startsWith('http')?cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.websiteLink:'https://'+cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.websiteLink}" target="_blank" class="action-link web-link" onclick="event.stopPropagation()">🌐 Website Go</a>`;
                    if(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.locationDesc) internalComponentsHTMLRefLinksButtonGenTextMapLinkVariablesOptionsRef += `<a href="https://maps.google.com/?q=${encodeURIComponent(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.locationDesc)}" target="_blank" class="action-link map-link" onclick="event.stopPropagation()">📍 Location Go</a>`;
                    
                    // Added Optional Bio Logic Render Map - No extra space if blank
                    let bioRenderHtmlDataExtContextStr = "";
                    if(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.bio && cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.bio.trim() !== "") {
                        bioRenderHtmlDataExtContextStr = `<div class="contact-bio" style="font-size:14px; margin-top:8px; opacity:0.85; white-space:pre-wrap;">${escapeHTML(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.bio)}</div>`;
                    }

                    buildObjectDynamicLayoutMapConfigSetupLayerLogicStringVariablesSetupModGenSysMapText += `
                        <div class="type-contact">
                           <div class="contact-header">
                              <img src="${cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.imgSrc || 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png'}" alt="img_item" class="contact-img" onclick="showPictureFullScreenImageTapCallSystemLogicHookOverrideFuncParamEventLogicStopFlowControlPropLogic(event, this.src)">
                              <div class="contact-name">${escapeHTML(cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.title)}</div>
                           </div>
                           ${bioRenderHtmlDataExtContextStr}
                           <div class="contact-actions">${internalComponentsHTMLRefLinksButtonGenTextMapLinkVariablesOptionsRef}</div>
                        </div>`;
                }

                if(hostAuthorized) {
                     buildObjectDynamicLayoutMapConfigSetupLayerLogicStringVariablesSetupModGenSysMapText += `<div class="host-tools" onclick="event.stopPropagation()">
                           <button title="Shift Component Position Down" onclick="relocateSequenceValElemDownObjFunctionSysMoveValSystemLogicFlowMethodDirectionArrow(${positionalArrayIntCurrentIterationLayerNodeIdxIntNumSysArrListLoopIntReferenceValNumIdxIntValLoopArrayRefTargetPosExtIntNumVal})">⬇</button>
                           <button title="Shift Component Position Up" onclick="relocateSequenceValElemUpObjFunctionSysMoveValSystemLogicFlowMethodDirectionArrow(${positionalArrayIntCurrentIterationLayerNodeIdxIntNumSysArrListLoopIntReferenceValNumIdxIntValLoopArrayRefTargetPosExtIntNumVal})">⬆</button>
                           
                           <!-- Tool Options Transfer Relocate Tool -->
                           <button title="Transfer Data Folder Destination Mod Exec" style="color:#f59e0b; font-weight: bold;" onclick="executeItemMoveSequenceToTransferOperationLocationSystemAction('${cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.id}')">🚚 Move</button>

                           <button title="Edit Interface Setup UI Tools Change Set Target Ext Setting Value Tool Exec UI Modifier Configuration System" onclick="activateModifyObjValuesLevelMenuOpenerToolBoxFormConfigMethodActionFunctionExecuteMethodModifierLoaderExecutionMethodTargetSysLayerRefTargetDataConfigCall( '${cChildObjectRefCurrentNavDirPosIterSetupListCurrentElementIterVarLoopArrNumObj.id}' )">✏ Edit</button>
                           <button title="Erase Purge Drop Bin Erase Tools Set Route Cut Run Options Slice Slice Operation Dump Ext Map Remove" style="color:#ef4444;" onclick="sliceDataDumpCompletelyLogicSystemDeleteParamRemoveEraseArrayNodeObjectMethodCallEraseToolOperationBinCommandExecution( ${positionalArrayIntCurrentIterationLayerNodeIdxIntNumSysArrListLoopIntReferenceValNumIdxIntValLoopArrayRefTargetPosExtIntNumVal} )">🗑</button>
                        </div>`;
                }
                
                layoutNodeObjectComponentFinalCreationBlockDIVWrapperBuildRefElementContainerStrConstructDivLayerDomDivRootSysTagWrapperBoxElHtml.innerHTML = buildObjectDynamicLayoutMapConfigSetupLayerLogicStringVariablesSetupModGenSysMapText;
                viewListContainer.appendChild(layoutNodeObjectComponentFinalCreationBlockDIVWrapperBuildRefElementContainerStrConstructDivLayerDomDivRootSysTagWrapperBoxElHtml);
            });
        }

        // System Event Intercepts Functions Logics
        function handleSearch() { loadUiNodeCurrentPageLevelView(); }

        function forwardLayer(folderDestinationNextLevelIdentCodePushArrayValPathLayerIdDirStringReference) {
            document.getElementById('search-box').value = '';
            navigationHistory.push(folderDestinationNextLevelIdentCodePushArrayValPathLayerIdDirStringReference);
            loadUiNodeCurrentPageLevelView();
        }
        function navigateBack() {
